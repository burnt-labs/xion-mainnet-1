name: Create Release PR

on:
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      deposit:
        required: false
        default: "1000000000uxion"
        type: string
      expedited:
        required: false
        default: false
        type: boolean

  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to update the chain registry with"
        required: true
        type: string
      deposit:
        description: "Deposit amount (default: 1000000000uxion)"
        required: false
        default: "1000000000uxion"
        type: string
      expedited:
        description: "Expedited proposal"
        required: false
        default: false
        type: boolean

jobs:
  create-release-pr:
    runs-on: ubuntu-latest

    env:
      XION_API_URL: "https://api.xion-mainnet-1.burnt.com"
      MINTSCAN_CHAIN_ID: "xion-mainnet-1"
      NETWORK_NAME: "xion-mainnet-1"
      TARGET_BRANCH: "main"
      RELEASE_TAG: "${{ inputs.release_tag }}"
      DEPOSIT: "${{ inputs.deposit || '1000000000uxion' }}"
      EXPEDITED: "${{ inputs.expedited || 'false' }}"
      # Mainnet: 1 week (604800s) non-expedited, 48h (172800s) expedited
      UPGRADE_WINDOW_SECONDS: "${{ inputs.expedited == true && '172800' || '604800' }}"
      PLACEHOLDER_CHECKSUM: "--ADD-HERE-YOUR-VALUE--"
      CLAUDE_API_KEY: "${{ secrets.BURNT_CLAUDE_API_KEY }}"
      GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      RUN_NUMBER: "${{ github.run_number }}"
      COMMIT_SHA: "${{ github.sha }}"
      GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run release workflow
        run: ./scripts/orchestrate-release.sh
